name: Release Model

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install transformers peft huggingface-hub

    - name: Get model from outputs
      run: |
        # Assuming model is in outputs/model_final from training
        ls -la outputs/model_final/ || echo "No model found - this is expected in dev setup"

    - name: Push to Hugging Face Hub
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        import os
        from huggingface_hub import login
        token = os.environ['HF_TOKEN']
        login(token=token)
        print('Model release step configured')
        "

    - name: Create Release Notes
      run: |
        echo "## Release ${{ github.ref_name }}" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "Released at: $(date)" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "[View Model](https://huggingface.co/dhruvanmurthy/qwen3-8b-tool-use-lora)" >> RELEASE_NOTES.md

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
