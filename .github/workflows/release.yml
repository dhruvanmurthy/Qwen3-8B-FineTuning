name: Release Model

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install transformers peft huggingface-hub

    - name: Inspect released adapter outputs
      run: |
        ls -la outputs/ || true
        ls -la outputs/sft/ || echo "No SFT adapter found - this is expected in dev setup"
        ls -la outputs/grpo/ || echo "No GRPO adapter found - this is expected in dev setup"

    - name: Push adapters to Hugging Face Hub
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        import os
        from huggingface_hub import HfApi, upload_folder
        token = os.environ['HF_TOKEN']
        api = HfApi(token=token)

        # Upload SFT adapter if present
        if os.path.isdir('outputs/sft'):
            api.create_repo('dhruvanmurthy/qwen3-8b-tool-use-sft-lora', repo_type='model', exist_ok=True, private=False)
            upload_folder(repo_id='dhruvanmurthy/qwen3-8b-tool-use-sft-lora', folder_path='outputs/sft', token=token, commit_message='Release ${{ github.ref_name }}')
            print('SFT adapter pushed.')

        # Upload GRPO adapter if present
        if os.path.isdir('outputs/grpo'):
            api.create_repo('dhruvanmurthy/qwen3-8b-tool-use-grpo-lora', repo_type='model', exist_ok=True, private=False)
            upload_folder(repo_id='dhruvanmurthy/qwen3-8b-tool-use-grpo-lora', folder_path='outputs/grpo', token=token, commit_message='Release ${{ github.ref_name }}')
            print('GRPO adapter pushed.')
        "

    - name: Push synthetic dataset to Hugging Face Hub
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python scripts/push_dataset_to_hub.py \
          --data-dir data/raw/synthetic \
          --repo-id dhruvanmurthy/qwen3-8b-synthetic-tool-use

    - name: Create Release Notes
      run: |
        echo "## Release ${{ github.ref_name }}" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "Released at: $(date)" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "- [SFT Model](https://huggingface.co/dhruvanmurthy/qwen3-8b-tool-use-sft-lora)" >> RELEASE_NOTES.md
        echo "- [GRPO Model](https://huggingface.co/dhruvanmurthy/qwen3-8b-tool-use-grpo-lora)" >> RELEASE_NOTES.md
        echo "- [Synthetic Dataset](https://huggingface.co/datasets/dhruvanmurthy/qwen3-8b-synthetic-tool-use)" >> RELEASE_NOTES.md

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
