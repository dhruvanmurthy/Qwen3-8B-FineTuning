# QLoRA Configuration for Qwen3-8B
# Defines 4-bit quantization and LoRA parameters

quantization_config:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora_config:
  r: 64
  lora_alpha: 16
  lora_dropout: 0.05
  
  # Target modules
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  
  bias: "none"
  task_type: "CAUSAL_LM"
  modules_to_save: []

# Training hyperparameters
training:
  learning_rate: 2.0e-4
  num_epochs: 3
  per_device_batch_size: 16
  gradient_accumulation_steps: 2
  
  # Scheduler
  warmup_steps: 0
  warmup_ratio: 0.1
  scheduler_type: "linear"
  
  # Optimization
  weight_decay: 0.01
  max_grad_norm: 1.0
  optimizer: "adamw_8bit"
  
  # Memory
  gradient_checkpointing: true
  mixed_precision: "bfloat16"

evaluation:
  eval_strategy: "steps"
  eval_steps: 250
  save_steps: 250
  save_total_limit: 3
  metric_for_best_model: "eval_loss"
  load_best_model_at_end: true

data:
  max_seq_length: 2048
  preprocessing_num_workers: 4
  dataloader_pin_memory: true
  dataloader_num_workers: 4
  remove_unused_columns: true

logging:
  logging_steps: 10
  logging_dir: "./logs"
  report_to:
    - "wandb"
    - "tensorboard"

reproducibility:
  seed: 42
  # Note: Only 'seed' is supported by TrainingArguments.
  # torch/numpy/random seeds are derived automatically.
