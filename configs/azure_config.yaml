# Azure ML Job Configuration
# YAML job definition for Azure ML

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
name: qwen3-8b-finetuning
display_name: "Qwen3-8B Fine-tuning (QLoRA)"
experiment_name: "qwen3-8b-tool-use"
description: "Multi-step tool use fine-tuning on API-Bank + ToolBench"

type: command

compute: azureml:gpu-cluster

environment:
  image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-devel:latest
  conda_file: ./environment.yml

code: .

command: >-
  python src/train.py
  --model_name_or_path Qwen/Qwen3-8B
  --data_dir ${{inputs.training_data}}
  --output_dir ${{outputs.model}}
  --num_train_epochs 3
  --per_device_train_batch_size 16
  --gradient_accumulation_steps 2
  --learning_rate 2e-4
  --warmup_ratio 0.1
  --weight_decay 0.01
  --eval_strategy steps
  --eval_steps 250
  --save_steps 250
  --save_total_limit 3
  --load_best_model_at_end true
  --bf16
  --gradient_checkpointing
  --logging_steps 10
  --report_to wandb
  --seed 42

inputs:
  training_data:
    type: uri_folder
    path: azureml://datastores/workspacefilestore/paths/data/processed
    mode: ro_mount

outputs:
  model:
    type: uri_folder
    path: azureml://datastores/workspacefilestore/paths/outputs/model_final
    mode: rw_mount

timeout: 86400  # 24 hours
resources:
  instance_count: 1

# Scale-out config (multi-GPU, if available)
distribution:
  type: pytorch

# Job-level env variables
environment_variables:
  CUDA_VISIBLE_DEVICES: "0"
  MIXED_PRECISION: "bf16"
  SEED: "42"
  WANDB_PROJECT: "qwen3-8b-tool-use"

# Continue on errors
continue_on_step_failure: false
