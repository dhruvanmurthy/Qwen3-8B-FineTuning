# Dataset Configuration
# Defines dataset sources, paths, and preprocessing parameters

sources:
  synthetic:
    enabled: true
    name: "Synthetic"
    path: "./data/raw/synthetic/"
    type: "local"
    samples: 15000
    weight: 1.0
    description: "Generated via instruction templates"

# Data preprocessing
preprocessing:
  max_seq_length: 2048
  min_seq_length: 50
  remove_duplicates: true
  dedup_method: "md5"  # or "semantic"
  remove_incomplete: true
  remove_non_english: false
  language_threshold: 0.8

  # Filtering
  filter_long_sequences: true
  filter_short_sequences: true

  # Augmentation (optional)
  augmentation_enabled: false
  augmentation_rate: 0.1

# Data splitting
splits:
  train: 0.8
  validation: 0.1
  test: 0.1

seed: 42
stratified: false

# Balancing
balance_sources: true
balance_by_category: false
undersample_majority_tools: false
majority_tool_ratio: 0.05  # Keep only 5% of most common tools

# Output
output_format: "jsonl"
output_dir: "./data/processed"

# Logging
log_level: "info"
print_statistics: true
